name: Sequifi E2E Tests

# ── When to run ──────────────────────────────────────
on:
  # Run on every push to main/master
  push:
    branches: [ main, master ]

  # Run on pull requests
  pull_request:
    branches: [ main, master ]

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      tag:
        description: 'Cucumber tag to run (e.g. @smoke, @SolarE2E, @E2ETC2016)'
        required: false
        default: '@smoke'
      environment:
        description: 'Target environment'
        required: false
        default: 'Solar Stage'
        type: choice
        options:
          - Solar Stage
          - Turf Stage
          - Pest Stage
          - Fiber Stage

# ── Jobs ─────────────────────────────────────────────
jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Setup Chrome browser
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      # 4. Run tests
      - name: Run E2E Tests
        run: mvn clean test -Dcucumber.filter.tags="${{ github.event.inputs.tag || '@smoke' }}"
        env:
          DISPLAY: ':99'

      # 5. Upload test reports (always, even if tests fail)
      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: Reports/
          retention-days: 30

      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: |
            Reports/Settings_Report.html
            Reports/CucumberReport.html
          retention-days: 30

      # 6. Upload screenshots (if any)
      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: Screenshots/
          retention-days: 10
          if-no-files-found: ignore
